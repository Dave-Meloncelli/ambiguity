name: Ambiguity Gate

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.txt"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.txt"

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -q

  gate:
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ambiguity
        run: pip install -e .

      - name: Find changed prompt files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACM "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | grep -iE '\.md$|\.txt$' || true)
          else
            FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 | grep -iE '\.md$|\.txt$' || true)
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run ambiguity gate on changed files
        shell: bash
        run: |
          FAILED=0
          while IFS= read -r file; do
            if [ -z "$file" ] || [ ! -f "$file" ]; then
              continue
            fi
            echo "Checking: $file"
            CONTENT=$(cat "$file")
            echo "$CONTENT" | ambiguity analyze --pipe --gate 6.0 --json || {
              echo "FAIL: $file exceeds ambiguity gate (6.0)"
              FAILED=1
            }
          done <<< "${{ steps.changed.outputs.files }}"
          if [ "$FAILED" -ne 0 ]; then
            echo "One or more files exceed the ambiguity gate."
            echo "Restructure these prompts to reduce ambiguity before merging."
            exit 1
          fi
          echo "All prompt files pass the ambiguity gate."
