name: Ambiguity Gate

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.txt"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.txt"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ambiguity
        run: |
          pip install -e .

      - name: Find changed prompt files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACM "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | grep -iE '\.md$|\.txt$' || true)
          else
            FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 | grep -iE '\.md$|\.txt$' || true)
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run ambiguity gate on changed files
        run: |
          FAILED=0
          while IFS= read -r file; do
            if [ -z "$file" ] || [ ! -f "$file" ]; then
              continue
            fi
            echo "Checking: $file"
            CONTENT=$(cat "$file")
            echo "$CONTENT" | ambiguity analyze --pipe --gate 6.0 --json || {
              echo "FAIL: $file exceeds ambiguity gate (6.0)"
              FAILED=1
            }
          done <<< "${{ steps.changed.outputs.files }}"
          if [ "$FAILED" -ne 0 ]; then
            echo "One or more files exceed the ambiguity gate."
            echo "Restructure these prompts to reduce ambiguity before merging."
            exit 1
          fi
          echo "All prompt files pass the ambiguity gate."
