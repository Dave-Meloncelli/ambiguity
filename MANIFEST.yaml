version: 1
name: ambiguity-analyzer
purpose: Deterministic prompt analysis — pre-flight linter for human-to-model translation
status: active

package:
  product_name: ambiguity
  expanded_name: ambiguity-analyzer
  release_class: public
  posture: standalone
  safety: deterministic
  license: MIT

files:
  - README.md
  - LICENSE
  - docs/AGENTS.md
  - docs/QUICKSTART.md
  - docs/CHANGELOG.md
  - docs/CHAP_ANCHOR.md
  - docs/memory.md
  - CONTRIBUTING.md
  - SECURITY.md
  - MANIFEST.yaml
  - opencode.json
  - CLAUDE.md
  - CONVENTIONS.md
  - .editorconfig
  - .gitignore
  - pyproject.toml
  - ts/package.json

implementations:
  python:
    path: src/ambiguity/
    install: pip install -e .
    test: pytest tests/
    entry: python -m ambiguity
  typescript:
    path: ts/src/
    install: cd ts && npm install
    build: cd ts && npm run build
    test: cd ts && npm test
    entry: npx ambiguity

surfaces:
  opencode: opencode.json
  claude_code: CLAUDE.md
  cursor: .cursor/rules/
  copilot: .github/copilot-instructions.md
  copilot_scoped:
    - .github/instructions/python.instructions.md
    - .github/instructions/typescript.instructions.md
  windsurf: .windsurf/rules/
  aider: CONVENTIONS.md
  cline: .clinerules/
  gemini: .gemini/GEMINI.md
  grok: .grok/GROK.md
  agent_guide: docs/AGENTS.md
  quickstart: docs/QUICKSTART.md
  changelog: docs/CHANGELOG.md
  contributing: CONTRIBUTING.md
  chap_anchor: docs/CHAP_ANCHOR.md
  manifest: MANIFEST.yaml

ecosystem:
  federation_registration: "C:\\Federation\\federation\\registry\\CHAP_AMBIGUITY_ANALYZER_ENTRY_20260525.md"
  retained_surfaces: "C:\\Federation\\federation\\registry\\RETAINED_SURFACES_CANON.json"
  registry_key: "ambiguity_analyzer"
  udl_bridge: "src/ambiguity/bridges.py"
